<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자연쌤의 웹 앱 공작소 ✨</title>
    <style>
        /* 1. 폰트 등록 */
        @font-face {
            font-family: 'KoPubDotumBold';
            src: url('./fonts/KoPub Dotum Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'MemomentKkukkukk';
            src: url('./fonts/MemomentKkukkukk.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. 전체 레이아웃 */
        body {
            background-color: #fff9f0;
            font-family: 'MemomentKkukkukk', 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff85a2;
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px #fff;
            font-family: 'MemomentKkukkukk', cursive;
        }

        /* 3. 잠금 화면 (KoPub 돋움 적용) */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff9f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #lock-screen h2, #lock-screen input, #lock-screen button {
            font-family: 'KoPubDotumBold', sans-serif !important;
        }

        input[type="password"] {
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #ff85a2;
            border-radius: 12px;
            text-align: center;
            outline: none;
        }

        #lock-screen button {
            margin-top: 15px;
            padding: 10px 30px;
            background: #ff85a2;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* 4. 앱 카드 컨테이너 및 공통 스타일 (테두리 색상 통일) */
        .app-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 100%;
        }

        .app-card {
            background: white;
            /* 모든 카드의 테두리와 그림자 색상을 #ffc2d1로 통일 */
            border: 3px solid #ffc2d1; 
            box-shadow: 0 8px 0 #ffc2d1;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            display: block;
        }

        .app-card:hover { 
            transform: translateY(-10px); 
            background-color: #fff5f7; /* 살짝 분홍빛 도는 배경으로 피드백 */
        }

        .app-card:active { 
            transform: translateY(5px); 
            box-shadow: 0 2px 0 #ffc2d1; 
        }

        .app-icon { font-size: 55px; margin-bottom: 10px; }
        .app-title { 
            font-family: 'MemomentKkukkukk', sans-serif !important; 
            font-size: 1.6rem; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }
        .app-card p { 
            font-family: 'MemomentKkukkukk', sans-serif !important; 
            margin: 5px 0; 
            font-size: 1.1rem; 
            color: #666; 
        }

    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>🔒 비밀번호를 입력하세요</h2>
        <input type="password" id="pw-input" placeholder="비밀번호 입력...">
        <button onclick="checkPassword()">입장하기</button>
    </div>

    <h1>✨ 자연쌤의 웹 앱 공작소 ✨</h1>

    <div class="app-container">
        <a href="PHOTOBOOTH.html" class="app-card">
            <div class="app-icon">📸</div>
            <div class="app-title">인생네컷 포토부스</div>
            <p>찰칵! 예쁜 추억을 남겨요</p>
        </a>

        <a href="aquarium.html" class="app-card">
            <div class="app-icon">🐠</div>
            <div class="app-title">수족관 놀이터</div>
            <p>물고기들과 함께 놀아요!</p>
        </a>

        <a href="orchard.html" class="app-card">
            <div class="app-icon">🍎</div>
            <div class="app-title">햇살 과수원</div>
            <p>나뭇가지에 열매가 대롱대롱!</p>
        </a>

        <a href="bird.html" class="app-card">
            <div class="app-icon">🐦</div>
            <div class="app-title">숲속 놀이터</div>
            <p>새들이 훨훨~ 숲속을 날아요!</p>
        </a>

        <a href="touch.html" class="app-card">
            <div class="app-icon">🖐️</div>
            <div class="app-title">팡팡 터치 배틀</div>
            <p>누가누가 더 많이 터치할까?</p>
        </a>

        <a href="curling.html" class="app-card">
            <div class="app-icon">🥌</div>
            <div class="app-title">교실 컬링 올림픽</div>
            <p>스톤을 밀어서 과녁 안으로!</p>
        </a>

        <a href="twinkle.html" class="app-card">
            <div class="app-icon">✨</div>
            <div class="app-title">트윙클 아트</div>
            <p>손가락으로 그리는 반짝이 예술!</p>
        </a>

        <a href="balloon.html" class="app-card">
            <div class="app-icon">🎈</div>
            <div class="app-title">알록달록 풍선 팝팝</div>
            <p>떠오르는 풍선을 톡! 터뜨려요</p>
        </a>

        <a href="rhythm.html" class="app-card">
            <div class="app-icon">🎸</div>
            <div class="app-title">반짝반짝 리듬파티</div>
            <p>음악에 맞춰 별을 톡톡!</p>
        </a>

    </div>

    <script>
        function checkPassword() {
            const correctPassword = "03jayeon";
            const input = document.getElementById('pw-input').value;
            if (input === correctPassword) {
                document.getElementById('lock-screen').style.display = 'none';
            } else {
                alert("비밀번호가 틀렸습니다!");
            }
        }

        document.getElementById('pw-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { checkPassword(); }
        });
    </script>
</body>
</html>
