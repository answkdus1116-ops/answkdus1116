<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자연쌤의 웹 앱 공작소 ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        body {
            background-color: #fff9f0;
            font-family: 'Gaegu', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff85a2;
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px #fff;
        }

        .app-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 900px;
            width: 100%;
        }

        .app-card {
            background: white;
            border: 3px solid #ffc2d1;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 0 #ffc2d1;
            display: block;
        }

        .aqua-card { border-color: #a2d2ff; box-shadow: 0 8px 0 #a2d2ff; }
        .aqua-card:hover { background-color: #f0f8ff; }
        .aqua-card:active { box-shadow: 0 2px 0 #a2d2ff; }

        .orchard-card { border-color: #a8e063; box-shadow: 0 8px 0 #a8e063; }
        .orchard-card:hover { background-color: #f7fff0; }
        .orchard-card:active { box-shadow: 0 2px 0 #a8e063; }

        .touch-card { border-color: #cdb4db; box-shadow: 0 8px 0 #cdb4db; }
        .touch-card:hover { background-color: #f8f0ff; }
        .touch-card:active { box-shadow: 0 2px 0 #cdb4db; }

        .app-card:hover { transform: translateY(-10px); }
        .app-card:active { transform: translateY(5px); }

        .app-icon { font-size: 55px; margin-bottom: 10px; }
        .app-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
        p { margin: 5px 0; font-size: 1.1rem; color: #666; }
   /* 컬링 카드 전용 스타일 */
        .curling-card { border-color: #81d4fa; box-shadow: 0 8px 0 #81d4fa; }
        .curling-card:hover { background-color: #e1f5fe; }
        .curling-card:active { box-shadow: 0 2px 0 #81d4fa; }

   /* 트윙클 카드 전용 스타일 */
        .twinkle-card { border-color: #fff176; box-shadow: 0 8px 0 #fff176; }
        .twinkle-card:hover { background-color: #fffde7; }
        .twinkle-card:active { box-shadow: 0 2px 0 #fff176; }
   
        .balloon-card { border-color: #ffadad; box-shadow: 0 8px 0 #ffadad; }
.balloon-card:hover { background-color: #fff5f5; }
.balloon-card:active { box-shadow: 0 2px 0 #ffadad; }

/* 리듬게임 카드 전용 스타일 */
.rhythm-card { 
    border-color: #ffd60a; 
    box-shadow: 0 8px 0 #ffd60a; 
}
.rhythm-card:hover { 
    background-color: #fff9db; 
}
.rhythm-card:active { 
    box-shadow: 0 2px 0 #ffd60a; 
}
/* 숲속 놀이터 카드 전용 스타일 */
.bird-card { 
    border-color: #8bc34a; 
    box-shadow: 0 8px 0 #8bc34a; 
}
.bird-card:hover { 
    background-color: #f1f8e9; 
}
.bird-card:active { 
    box-shadow: 0 2px 0 #8bc34a; 
}

#lock-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: #fff9f0; /* 배경색과 동일하게 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
input[type="password"] {
    font-family: 'Gaegu';
    padding: 10px;
    font-size: 1.2rem;
    border: 2px solid #ff85a2;
    border-radius: 10px;
}
button {
    font-family: 'Gaegu';
    margin-top: 10px;
    padding: 5px 20px;
    background: #ff85a2;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
   </style>
</head>

        <a href="bird.html" class="app-card bird-card">

        <a href="curling.html" class="app-card curling-card">

        <a href="twinkle.html" class="app-card twinkle-card">

<a href="balloon.html" class="app-card balloon-card">
