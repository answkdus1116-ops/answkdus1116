<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🥌 교실 컬링 올림픽 (2인용)</title>
  <link rel="stylesheet" href="curling.css">
</head>
<body>
  <div class="ui-panel">
    <h1>🥌 교실 컬링 2인전</h1>
    <div class="score-board">
      <div class="score-box p1" id="box-p1">
        <span class="player-name">🔵 왼쪽 선수</span>
        <span id="p1-score" class="score">0</span>
      </div>
      <div class="vs">VS</div>
      <div class="score-box p2" id="box-p2">
        <span class="player-name">🔴 오른쪽 선수</span>
        <span id="p2-score" class="score">0</span>
      </div>
    </div>
    <div class="controls">
      <select id="bgm-select">
        <option value="healing.mp3">🌿 힐링 음악</option>
        <option value="bgm_custom.mp3">🎼 내 음악</option>
      </select>
      <button id="play-btn">🎵 재생</button>
      <button id="reset-btn">🔄 리셋</button>
    </div>
    <p id="message">스톤을 손가락으로 끌어당겼다 놓아 보세요!</p>
  </div>

  <div id="rink">
    <div id="target"></div>
    <canvas id="aimCanvas"></canvas>
    <!-- 스톤은 JS가 생성 -->

    <div id="turn-overlay" class="overlay">
      <div class="overlay-content">
        <h2 id="overlay-text">🔵 왼쪽 선수 차례!</h2>
        <p class="hint">스톤을 아래로 끌어당겼다가 놓으면 발사돼요.<br>방향과 세기를 조절할 수 있어요!</p>
        <button class="big" id="start-turn-btn">✨ 스톤 잡기 🥌</button>
      </div>
    </div>

    <div id="result-overlay" class="overlay hidden">
      <div class="overlay-content">
        <h1 id="winner-text">🏆 경기 끝! 🏆</h1>
        <p id="final-score-text"></p>
        <button class="big" onclick="location.reload()">🎮 한 판 더!</button>
      </div>
    </div>
  </div>

  <audio id="bgm-player" loop></audio>
  <script src="curling.js"></script>
</body>
</html>
