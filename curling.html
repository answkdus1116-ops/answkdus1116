<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥌 교실 컬링 올림픽 (2인용) 🥌</title>
    <link rel="stylesheet" href="curling.css">
</head>
<body>
    <div class="ui-panel">
        <h1>🥌 교실 컬링 2인전 🥌</h1>
        
        <div class="score-board">
            <div class="score-box p1">
                <span class="player-name">왼쪽 선수</span>
                <span id="p1-score" class="score">0</span>
            </div>
            <div class="vs">VS</div>
            <div class="score-box p2">
                <span class="player-name">오른쪽 선수</span>
                <span id="p2-score" class="score">0</span>
            </div>
        </div>

        <div class="controls">
    <label for="bgm-select">🎵 배경음악:</label>
    <select id="bgm-select">
        <option value="healing.mp3">🌿 힐링 음악 (healing.mp3)</option>
        <option value="bgm_custom.mp3">🎼 내 음악 (bgm_custom.mp3)</option>
    </select>
    <button id="play-btn">재생 ▶️</button>
    <button id="reset-btn">경기 리셋 🔄</button>
</div>
        
        <p id="message">준비되셨나요? 게임을 시작하세요!</p>
    </div>

    <div id="rink">
        <div id="target"></div>
        <div id="stone" class="p1-turn"></div>
        
        <div id="turn-overlay" class="overlay">
    <div class="overlay-content">
        <h2 id="overlay-text">이번엔 누구 차례일까요?</h2>
        <button id="start-turn-btn">
            <span>✨</span> 스톤 잡기 <span>🥌</span>
        </button>
    </div>
</div>

<div id="result-overlay" class="overlay hidden">
    <div class="overlay-content result-content">
        <h1 id="winner-text" style="font-size: 40px;">🏆 경기 끝! 🏆</h1>
        <p id="final-score-text" style="font-size: 24px; margin: 20px 0;"></p>
        <button onclick="location.reload()">
            <span>🎮</span> 우리 한 판 더 해요! <span>🎮</span>
        </button>
    </div>
</div>
    </div>

    <audio id="bgm-player" loop></audio>
    <audio id="sfx-player"></audio>

    <script src="curling.js"></script>
</body>
</html>
