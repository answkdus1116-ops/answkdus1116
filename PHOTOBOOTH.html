<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인생네컷 Pro - 크기 조절 완벽판</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');
        :root { --accent: #6366f1; }
        body { margin: 0; font-family: 'Gaegu', sans-serif; background: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .app-container { display: flex; width: 95vw; height: 90vh; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        @media (max-width: 820px) { .app-container { flex-direction: column; height: 95vh; overflow-y: auto; } .control-panel { width: auto !important; border-left: none !important; border-top: 1px solid #eee; } }
        
        .editor-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: #f8fafc; position: relative; }
        .canvas-wrapper { position: relative; width: 100%; max-width: 350px; aspect-ratio: 400 / 800; background: #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #mainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; cursor: crosshair; touch-action: none; }
        #cameraView { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #countdown { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: var(--accent); font-weight: bold; z-index: 10; display: none; text-shadow: 2px 2px 10px white; }
        
        .control-panel { width: 380px; padding: 25px; border-left: 1px solid #eee; overflow-y: auto; }
        .tool-box { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .ai-switch-box { background: #eef2ff; border: 2px solid var(--accent); padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        
        /* 스위치 스타일 */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .theme-btn { padding: 10px; border: 2px solid #eee; background: white; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: bold; }
        .theme-btn.active { border-color: var(--accent); background: #f5f3ff; color: var(--accent); }
        
        input[type="text"], select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; font-family: inherit; }
        .btn-primary { background: var(--accent); color: white; margin-top: 10px; }
        
        .sticker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; font-size: 26px; text-align: center; }
        .sticker-item { cursor: pointer; padding: 5px; border-radius: 5px; transition: 0.2s; }
        
        /* 크기 조절 슬라이더 커스텀 */
        #sizeSlider { width: 100%; margin: 10px 0; accent-color: var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <section class="editor-view">
            <div id="countdown">3</div>
            <div class="canvas-wrapper">
                <video id="cameraView" autoplay playsinline muted></video>
                <canvas id="mainCanvas"></canvas>
            </div>
            <div style="margin-top:20px; width:100%; max-width:400px; display:flex; flex-direction:column; gap:10px;">
                <div id="captureControls">
                    <button class="btn-primary" onclick="handleCapture()">📸 <span id="cutText">첫 번째 컷</span> 촬영</button>
                </div>
                <div id="confirmControls" class="hidden" style="display:flex; gap:10px;">
                    <button onclick="retake()" style="background:#64748b; color:white;">❌ 다시 찍기</button>
                    <button onclick="nextCut()" style="background:#22c55e; color:white;">✅ 다음으로</button>
                </div>
                <div id="editActions" class="hidden" style="display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-primary" onclick="downloadImage()">💾 사진 저장</button>
                    <button id="downloadVideoBtn" style="background:#f59e0b; color:white;" onclick="downloadVideo()">🎥 영상 저장 (4초)</button>
                    <button onclick="resetStudio()" style="background:#64748b; color:white;">🔄 초기화</button>
                </div>
            </div>
        </section>

        <aside class="control-panel">
            <div class="ai-switch-box">
                <span style="font-weight: bold; color: var(--accent);">✨ AI 배경제거 모드</span>
                <label class="switch"><input type="checkbox" id="bgRemovalToggle"><span class="slider"></span></label>
            </div>
            
            <h3>🖼️ 배경 테마</h3>
            <div class="theme-grid">
                <button class="theme-btn active" onclick="changeTheme('none', this)">🤍 화이트</button>
                <button class="theme-btn" onclick="changeTheme('spring', this)">🌸 봄 핑크</button>
                <button class="theme-btn" onclick="changeTheme('summer', this)">🌻 여름 블루</button>
                <button class="theme-btn" onclick="changeTheme('autumn', this)">🍂 가을 오렌지</button>
                <button class="theme-btn" onclick="changeTheme('winter', this)">☃️ 겨울 그레이</button>
                <button class="theme-btn" onclick="changeTheme('grad', this)">🎓 졸업 축하</button>
                <button class="theme-btn" onclick="changeTheme('celebration', this)">🎉 파티 축하</button>
            </div>

            <div id="selectedControls" class="tool-box hidden" style="border: 2px solid var(--accent); background: #f5f3ff;">
                <h3 style="margin-top:0; color:var(--accent);">📏 크기 조절</h3>
                <input type="range" id="sizeSlider" min="20" max="200" value="50" oninput="changeSize(this.value)">
                <button style="background:#ef4444; color:white; padding:8px;" onclick="deleteSelected()">🗑️ 삭제하기</button>
            </div>

            <div class="tool-box">
                <h3>✍️ 문구 추가</h3>
                <input type="text" id="textInput" placeholder="내용 입력">
                <div style="display:flex; gap:5px;">
                    <select id="fontFamily" style="flex:2;"><option value="Gaegu">개구체</option><option value="Arial">고딕체</option></select>
                    <input type="color" id="textColor" value="#000000" style="flex:1; height:40px; border:1px solid #ddd; padding:2px;">
                </div>
                <button class="btn-primary" onclick="addTextObject()">문구 넣기</button>
            </div>

            <h3>⭐ 스티커 (클릭 후 드래그)</h3>
            <div class="sticker-grid">
                <span class="sticker-item" onclick="addSticker('❤️')">❤️</span><span class="sticker-item" onclick="addSticker('✨')">✨</span><span class="sticker-item" onclick="addSticker('🍀')">🍀</span><span class="sticker-item" onclick="addSticker('🐥')">🐥</span><span class="sticker-item" onclick="addSticker('🎀')">🎀</span>
                <span class="sticker-item" onclick="addSticker('🌸')">🌸</span><span class="sticker-item" onclick="addSticker('🔥')">🔥</span><span class="sticker-item" onclick="addSticker('🎓')">🎓</span><span class="sticker-item" onclick="addSticker('🧸')">🧸</span><span class="sticker-item" onclick="addSticker('🐱')">🐱</span>
                <span class="sticker-item" onclick="addSticker('👑')">👑</span><span class="sticker-item" onclick="addSticker('🌈')">🌈</span><span class="sticker-item" onclick="addSticker('🍓')">🍓</span><span class="sticker-item" onclick="addSticker('🍕')">🍕</span><span class="sticker-item" onclick="addSticker('🍔')">🍔</span>
            </div>
        </aside>
    </div>

    <script>
        const video = document.getElementById('cameraView');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const bgToggle = document.getElementById('bgRemovalToggle');

        let objects = [], selectedObj = null, isDragging = false;
        let photos = [], currentCut = 0, currentTheme = 'none';
        let cutFrames = [[], [], [], []];
        let segmentationMask = null, selfieSegmentation = null;
        let isRecording = false;

        canvas.width = 400; canvas.height = 800;
        const targetW = 340; const targetH = 155;
        const startY = 45; const gapY = 175;

        const themes = {
            none: { color: '#ffffff', icons: [] },
            spring: { color: '#fff0f5', icons: ['🌸', '🌷', '🌿'] },
            summer: { color: '#e0f7fa', icons: ['🌻', '🌊', '☀️'] },
            autumn: { color: '#fff3e0', icons: ['🍂', '🍁', '🌾'] },
            winter: { color: '#f1f5f9', icons: ['☃️', '❄️', '🌲'] },
            grad: { color: '#f8fafc', icons: ['🎓', '💐', '✨'] },
            celebration: { color: '#fef08a', icons: ['🎉', '🎈', '🎁'] }
        };

        async function init() {
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });
            selfieSegmentation.setOptions({ modelSelection: 1 });
            selfieSegmentation.onResults(results => { segmentationMask = results.segmentationMask; });
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.play();
                async function aiLoop() { if (video.readyState >= 2) await selfieSegmentation.send({image: video}); requestAnimationFrame(aiLoop); }
                aiLoop();
            } catch(e) { alert("카메라를 시작할 수 없습니다."); }
        }

        function drawUser(tCtx, x, y, width, height) {
            const vW = video.videoWidth, vH = video.videoHeight;
            const targetRatio = width / height, vRatio = vW / vH;
            let sX, sY, sW, sH;
            if (vRatio > targetRatio) { sH = vH; sW = sH * targetRatio; sX = (vW - sW) / 2; sY = 0; }
            else { sW = vW; sH = sW / targetRatio; sX = 0; sY = (vH - sH) / 2; }
            tCtx.save(); tCtx.translate(x + width, y); tCtx.scale(-1, 1);
            if (bgToggle.checked && segmentationMask) {
                const temp = document.createElement('canvas'); temp.width = width; temp.height = height;
                const tc = temp.getContext('2d');
                tc.drawImage(video, sX, sY, sW, sH, 0, 0, width, height);
                tc.globalCompositeOperation = 'destination-in';
                tc.drawImage(segmentationMask, sX, sY, sW, sH, 0, 0, width, height);
                tCtx.drawImage(temp, 0, 0, width, height);
            } else { tCtx.drawImage(video, sX, sY, sW, sH, 0, 0, width, height); }
            tCtx.restore();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const config = themes[currentTheme];
            ctx.fillStyle = config.color; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // [부활 유지] 테마 이모지
            if(config.icons.length > 0) {
                ctx.font = "24px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                for(let x=25; x<=375; x+=50) { ctx.fillText(config.icons[x%config.icons.length], x, 22); ctx.fillText(config.icons[(x+1)%config.icons.length], x, canvas.height-22); }
                for(let y=70; y < canvas.height - 50; y+=55) {
                    let isOverlap = false;
                    for(let i=0; i<4; i++) { if(y > (startY + i*gapY) - 10 && y < (startY + i*gapY) + targetH + 10) isOverlap = true; }
                    if(!isOverlap) { ctx.fillText(config.icons[y%config.icons.length], 12, y); ctx.fillText(config.icons[(y+1)%config.icons.length], 388, y); }
                }
            }

            for(let i=0; i<4; i++) {
                const py = startY + (i * gapY);
                if (photos[i]) {
                    if(isRecording && cutFrames[i].length > 0) {
                        const fIdx = Math.floor(Date.now() / 100) % cutFrames[i].length;
                        ctx.drawImage(cutFrames[i][fIdx], 30, py, targetW, targetH);
                    } else ctx.drawImage(photos[i], 30, py, targetW, targetH);
                } else if (i === currentCut && video.readyState >= 2) {
                    drawUser(ctx, 30, py, targetW, targetH);
                    if(countdownEl.style.display === 'block') {
                        const f = document.createElement('canvas'); f.width = targetW; f.height = targetH;
                        drawUser(f.getContext('2d'), 0, 0, targetW, targetH);
                        cutFrames[currentCut].push(f);
                    }
                }
            }

            objects.forEach(obj => {
                ctx.save(); ctx.font = `${obj.size}px ${obj.font || 'Arial'}`; ctx.fillStyle = obj.color || '#000';
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                if(selectedObj === obj) {
                    ctx.strokeStyle = "#6366f1"; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
                    ctx.strokeRect(obj.x - obj.size/1.5, obj.y - obj.size/1.5, obj.size*1.3, obj.size*1.3);
                }
                ctx.fillText(obj.content, obj.x, obj.y); ctx.restore();
            });
            requestAnimationFrame(render);
        }

        // --- 기능 함수들 ---
        function changeSize(val) { if(selectedObj) selectedObj.size = parseInt(val); }
        function deleteSelected() { objects = objects.filter(o => o !== selectedObj); selectedObj = null; document.getElementById('selectedControls').classList.add('hidden'); }
        function addSticker(s) { const newSticker = {content:s, x:200, y:400, size:50, font:'Arial', color:'#000'}; objects.push(newSticker); selectObject(newSticker); }
        function addTextObject() { 
            const v = document.getElementById('textInput').value; if(!v) return;
            const newText = {content:v, x:200, y:750, size:40, color:document.getElementById('textColor').value, font:document.getElementById('fontFamily').value};
            objects.push(newText); selectObject(newText); document.getElementById('textInput').value = '';
        }
        function selectObject(obj) {
            selectedObj = obj;
            document.getElementById('selectedControls').classList.remove('hidden');
            document.getElementById('sizeSlider').value = obj.size;
        }

        // --- 마우스/터치 드래그 로직 ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            const hit = [...objects].reverse().find(obj => Math.abs(obj.x - x) < obj.size/2 && Math.abs(obj.y - y) < obj.size/2);
            if(hit) { isDragging = true; selectObject(hit); }
            else { selectedObj = null; document.getElementById('selectedControls').classList.add('hidden'); }
        });
        window.addEventListener('mousemove', (e) => {
            if(isDragging && selectedObj) {
                const rect = canvas.getBoundingClientRect();
                selectedObj.x = (e.clientX - rect.left) * (canvas.width / rect.width);
                selectedObj.y = (e.clientY - rect.top) * (canvas.height / rect.height);
            }
        });
        window.addEventListener('mouseup', () => isDragging = false);

        // --- 캡처 및 영상 저장 ---
        async function handleCapture() {
            document.getElementById('captureControls').classList.add('hidden'); countdownEl.style.display = 'block';
            let count = 3; countdownEl.innerText = count; cutFrames[currentCut] = []; 
            const timer = setInterval(() => {
                count--; countdownEl.innerText = count;
                if(count <= 0) {
                    clearInterval(timer); countdownEl.style.display = 'none';
                    const cap = document.createElement('canvas'); cap.width = targetW; cap.height = targetH;
                    drawUser(cap.getContext('2d'), 0, 0, targetW, targetH);
                    photos[currentCut] = cap; document.getElementById('confirmControls').classList.remove('hidden');
                }
            }, 1000);
        }
        function nextCut() { currentCut++; document.getElementById('confirmControls').classList.add('hidden'); if(currentCut < 4) { document.getElementById('captureControls').classList.remove('hidden'); document.getElementById('cutText').innerText = (currentCut+1) + "번째 컷"; } else document.getElementById('editActions').classList.remove('hidden'); }
        function retake() { photos[currentCut] = null; cutFrames[currentCut] = []; document.getElementById('confirmControls').classList.add('hidden'); document.getElementById('captureControls').classList.remove('hidden'); }
        function downloadVideo() {
            const btn = document.getElementById('downloadVideoBtn'); btn.innerText = "🎬 제작 중..."; btn.disabled = true; isRecording = true;
            const stream = canvas.captureStream(30); const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = []; recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => { const blob = new Blob(chunks, { type: 'video/webm' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'life_four_cut.webm'; a.click(); isRecording = false; btn.innerText = "🎥 영상 저장 (4초)"; btn.disabled = false; };
            recorder.start(); setTimeout(() => recorder.stop(), 4000);
        }
        function changeTheme(t, b) { currentTheme = t; document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); }
        function downloadImage() { selectedObj = null; setTimeout(() => { const a = document.createElement('a'); a.download = 'photo.png'; a.href = canvas.toDataURL(); a.click(); }, 50); }
        function resetStudio() { location.reload(); }

        init(); render();
    </script>
</body>
</html>
